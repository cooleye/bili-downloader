<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilibili 视频下载</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    display: flex; justify-content: center; padding: 40px 16px;
  }
  .container { max-width: 680px; width: 100%; }

  /* Header */
  h1 {
    font-size: 24px; font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  h1 svg { width: 28px; height: 28px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }

  /* Card */
  .card {
    background: #fff; border-radius: 12px; padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px;
  }

  /* URL Input */
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; padding: 12px 16px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: #fb7299; }
  .btn {
    padding: 12px 24px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s; white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-primary { background: #fb7299; color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .85; }
  .btn-success { background: #00c853; color: #fff; }
  .btn-success:hover:not(:disabled) { opacity: .85; }
  .btn-download { background: #7c4dff; color: #fff; width: 100%; margin-top: 12px; }
  .btn-download:hover:not(:disabled) { opacity: .85; }

  /* Loading */
  .loading { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: #666; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2.5px solid #e0e0e0; border-top-color: #fb7299; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box { background: #fff0f0; border: 1px solid #ffcdd2; border-radius: 8px; padding: 12px 16px; color: #c62828; font-size: 14px; margin: 12px 0; }

  /* Video Info */
  .video-header { display: flex; gap: 16px; margin-bottom: 16px; }
  .video-header img {
    width: 160px; height: 100px; object-fit: cover; border-radius: 8px;
    flex-shrink: 0; background: #f5f5f5;
  }
  .video-meta { min-width: 0; }
  .video-meta h2 { font-size: 17px; line-height: 1.4; margin-bottom: 6px; }
  .video-meta .desc {
    font-size: 13px; color: #666; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .video-meta .duration {
    font-size: 13px; color: #999; margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Resolution */
  .res-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .res-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .res-option {
    position: relative;
  }
  .res-option input { position: absolute; opacity: 0; width: 0; height: 0; }
  .res-option label {
    display: inline-block; padding: 8px 20px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; cursor: pointer;
    transition: all .2s; user-select: none;
  }
  .res-option input:checked + label {
    border-color: #fb7299; background: #fff0f5; color: #fb7299; font-weight: 600;
  }
  .res-option label:hover { border-color: #fb7299; }

  /* Progress */
  .progress-section { margin-top: 12px; }
  .progress-status { font-size: 13px; color: #666; margin-bottom: 6px; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #fb7299, #ff9eb5);
    border-radius: 4px; transition: width .3s ease; width: 0%;
  }
  .progress-text { font-size: 13px; color: #999; margin-top: 6px; display: flex; justify-content: space-between; }
  .progress-text .speed { color: #666; }

  /* Success */
  .success-box {
    background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px;
    padding: 16px; text-align: center; margin-top: 8px;
  }
  .success-box p { font-size: 15px; color: #2e7d32; font-weight: 600; margin-bottom: 8px; }
  .success-box .file-info { font-size: 13px; color: #555; font-weight: 400; word-break: break-all; }

  /* Cookies */
  .cookies-summary {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .cookies-summary .indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-ok { background: #00c853; }
  .dot-miss { background: #ff9800; }
  .cookies-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  .cookies-body .hint {
    font-size: 12px; color: #999; line-height: 1.6; margin-bottom: 10px;
  }
  .cookies-body .hint code {
    background: #f5f5f5; padding: 1px 5px; border-radius: 3px; font-size: 12px;
  }
  .cookies-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .cookies-row input[type=file] { display: none; }
  .cookies-row .file-label {
    padding: 8px 16px; background: #f5f5f5; border: 1.5px dashed #ccc;
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .cookies-row .file-label:hover { border-color: #fb7299; background: #fff0f5; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-outline { background: transparent; border: 1.5px solid #e0e0e0; }
  .btn-outline:hover:not(:disabled) { border-color: #e53935; color: #e53935; }
  .cookies-status { font-size: 13px; color: #666; margin-top: 6px; }

  /* Batch Download */
  .batch-header {
    font-size: 17px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .batch-url-row {
    display: flex; gap: 6px; margin-bottom: 8px; align-items: center;
  }
  .batch-url-row input {
    flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
  }
  .batch-url-row input:focus { border-color: #fb7299; }
  .batch-url-row .btn-del {
    width: 32px; height: 32px; border: none; border-radius: 50%;
    background: #fff0f0; color: #e53935; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all .2s;
  }
  .batch-url-row .btn-del:hover { background: #ffcdd2; }
  .btn-add {
    padding: 8px 16px; border: 1.5px dashed #ccc; border-radius: 8px;
    background: transparent; color: #666; font-size: 14px; cursor: pointer;
    width: 100%; transition: all .2s; margin-bottom: 16px;
  }
  .btn-add:hover { border-color: #fb7299; color: #fb7299; background: #fff0f5; }
  .batch-dir { margin-bottom: 12px; }
  .batch-dir label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
  .dir-row { display: flex; gap: 8px; align-items: center; }
  .dir-row input {
    flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 13px; outline: none; font-family: monospace;
  }
  .dir-row input:focus { border-color: #fb7299; }
  .batch-res { margin: 12px 0; display: flex; align-items: center; gap: 12px; }
  .batch-res label { font-size: 13px; font-weight: 600; }
  .batch-res select {
    padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; outline: none; background: #fff;
  }
  .batch-res select:focus { border-color: #fb7299; }

  /* Batch Progress */
  .bp-overall { font-size: 13px; color: #666; margin-bottom: 4px; }
  .bp-current { font-size: 13px; color: #333; font-weight: 600; margin-bottom: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Batch Summary */
  .b-summary { font-size: 14px; }
  .b-summary p { margin: 4px 0; }
  .b-summary .s-ok { color: #2e7d32; }
  .b-summary .s-fail { color: #c62828; }
  .b-detail { font-size: 12px; color: #666; margin-top: 8px; max-height: 150px; overflow-y: auto; }
  .b-detail div { padding: 2px 0; }
  .b-detail .d-ok { color: #2e7d32; }
  .b-detail .d-fail { color: #c62828; }

  /* Utility */
  .hidden { display: none !important; }
  hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }

  @media (max-width: 540px) {
    .input-row { flex-direction: column; }
    .btn { text-align: center; }
    .video-header { flex-direction: column; }
    .video-header img { width: 100%; height: auto; aspect-ratio: 16/10; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="#fb7299" stroke-width="2">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polygon points="10,8 16,12 10,16" fill="#fb7299" stroke="none"/>
    </svg>
    Bilibili 视频下载
  </h1>
  <p class="subtitle">粘贴视频链接，选择分辨率，一键下载 MP4</p>

  <!-- Input -->
  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://www.bilibili.com/video/BV1..." autofocus>
      <button class="btn btn-primary" id="fetchBtn">获取信息</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="card loading hidden" id="loading">
    <div class="spinner"></div>
    <span>正在获取视频信息...</span>
  </div>

  <!-- Error -->
  <div class="error-box hidden" id="error"></div>

  <!-- Video Info -->
  <div class="card hidden" id="infoCard">
    <div class="video-header">
      <img id="thumbnail" src="" alt="缩略图" referrerpolicy="no-referrer">
      <div class="video-meta">
        <h2 id="videoTitle"></h2>
        <p class="desc" id="videoDesc"></p>
        <p class="duration" id="videoDuration"></p>
      </div>
    </div>

    <hr>

    <div class="res-title">选择分辨率</div>
    <div class="res-options" id="resolutionOptions"></div>

    <button class="btn btn-download" id="downloadBtn">下载视频</button>
  </div>

  <!-- Progress -->
  <div class="card hidden" id="progressCard">
    <div class="progress-section">
      <div class="progress-status" id="progressStatus">正在下载...</div>
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="progressPercent">0%</span>
        <span class="speed" id="progressSpeed"></span>
      </div>
    </div>
  </div>

  <!-- Success -->
  <div class="card hidden" id="successCard">
    <div class="success-box">
      <p>下载完成!</p>
      <p class="file-info" id="fileInfo"></p>
    </div>
  </div>

  <!-- Batch Download -->
  <div class="card" id="batchCard">
    <div class="batch-header">📦 批量下载</div>

    <div id="batchUrlList"></div>
    <button class="btn-add" id="addUrlBtn">+ 添加链接</button>

    <hr>

    <div class="batch-dir">
      <label>保存目录</label>
      <div class="dir-row">
        <input type="text" id="saveDir" placeholder="默认: downloads/">
        <button class="btn btn-sm btn-outline" id="resetDirBtn">重置</button>
      </div>
    </div>

    <div class="batch-res">
      <label>分辨率</label>
      <select id="batchRes">
        <option value="360p">360p</option>
        <option value="480p">480p</option>
        <option value="720p" selected>720p</option>
        <option value="1080p">1080p</option>
        <option value="1440p">1440p</option>
        <option value="2160p">2160p</option>
      </select>
    </div>

    <button class="btn btn-download" id="batchStartBtn">批量下载</button>

    <div class="hidden" id="batchProgress" style="margin-top:12px">
      <div class="bp-overall" id="bpOverall">总体进度: 0 / 0</div>
      <div class="bp-current" id="bpCurrent">等待中...</div>
      <div class="progress-bar-bg">
        <div class="progress-fill" id="bpFill"></div>
      </div>
      <div class="progress-text"><span id="bpPct">0%</span><span class="speed" id="bpSpeed"></span></div>
    </div>

    <div class="hidden" id="batchSummary" style="margin-top:12px">
      <div class="b-summary" id="bSummaryText"></div>
      <div class="b-detail" id="bDetailList"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const URL_INPUT     = $('urlInput');
const FETCH_BTN     = $('fetchBtn');
const LOADING       = $('loading');
const ERROR         = $('error');
const INFO_CARD     = $('infoCard');
const THUMBNAIL     = $('thumbnail');
const VIDEO_TITLE   = $('videoTitle');
const VIDEO_DESC    = $('videoDesc');
const VIDEO_DUR     = $('videoDuration');
const RES_OPTIONS   = $('resolutionOptions');
const DOWNLOAD_BTN  = $('downloadBtn');
const PROGRESS_CARD = $('progressCard');
const PROGRESS_FILL = $('progressFill');
const PROGRESS_PCT  = $('progressPercent');
const PROGRESS_SPD  = $('progressSpeed');
const PROGRESS_ST   = $('progressStatus');
const SUCCESS_CARD  = $('successCard');
const FILE_INFO     = $('fileInfo');

let currentUrl = '';
let taskId = '';
let pollTimer = null;

function formatDuration(sec) {
  if (!sec) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }
function setError(msg) {
  ERROR.textContent = msg;
  show(ERROR);
  hide(LOADING);
}

// Fetch info
FETCH_BTN.addEventListener('click', async () => {
  const url = URL_INPUT.value.trim();
  if (!url) { setError('请输入视频链接'); return; }

  hide(ERROR);
  hide(INFO_CARD);
  hide(PROGRESS_CARD);
  hide(SUCCESS_CARD);
  show(LOADING);
  FETCH_BTN.disabled = true;
  DOWNLOAD_BTN.disabled = true;
  currentUrl = url;

  try {
    const resp = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
    const json = await resp.json();
    if (!resp.ok || !json.success) {
      throw new Error(json.detail || '获取信息失败');
    }
    renderInfo(json.data);
  } catch (e) {
    setError(e.message);
  } finally {
    hide(LOADING);
    FETCH_BTN.disabled = false;
  }
});

function renderInfo(data) {
  THUMBNAIL.src = data.thumbnail || '';
  THUMBNAIL.onerror = () => { THUMBNAIL.src = ''; THUMBNAIL.style.display = 'none'; };
  VIDEO_TITLE.textContent = data.title;
  VIDEO_DESC.textContent = data.description || '暂无简介';
  VIDEO_DUR.textContent = `时长 ${formatDuration(data.duration)}`;

  RES_OPTIONS.innerHTML = '';
  const fmts = data.formats || [];
  fmts.forEach((fmt, i) => {
    const div = document.createElement('div');
    div.className = 'res-option';
    div.innerHTML = `
      <input type="radio" name="res" id="res_${fmt}" value="${fmt}" ${i === 0 ? 'checked' : ''}>
      <label for="res_${fmt}">${fmt}</label>
    `;
    RES_OPTIONS.appendChild(div);
  });

  DOWNLOAD_BTN.disabled = false;
  show(INFO_CARD);
}

// Download
DOWNLOAD_BTN.addEventListener('click', async () => {
  const selected = document.querySelector('input[name="res"]:checked');
  if (!selected) { setError('请选择分辨率'); return; }

  DOWNLOAD_BTN.disabled = true;
  hide(ERROR);
  hide(SUCCESS_CARD);
  show(PROGRESS_CARD);
  PROGRESS_FILL.style.width = '0%';
  PROGRESS_PCT.textContent = '0%';
  PROGRESS_SPD.textContent = '';
  PROGRESS_ST.textContent = '正在下载...';

  try {
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: currentUrl, resolution: selected.value }),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.detail || '启动下载失败');

    taskId = json.task_id;
    pollProgress();
  } catch (e) {
    setError(e.message);
    DOWNLOAD_BTN.disabled = false;
    hide(PROGRESS_CARD);
  }
});

function pollProgress() {
  if (pollTimer) clearTimeout(pollTimer);

  fetch(`/api/download/${taskId}/status`)
    .then(r => r.json())
    .then(data => {
      const pct = data.progress || 0;
      PROGRESS_FILL.style.width = pct + '%';
      PROGRESS_PCT.textContent = pct + '%';
      PROGRESS_SPD.textContent = data.speed || '';

      if (data.status === 'error') {
        setError(data.error || '下载失败');
        DOWNLOAD_BTN.disabled = false;
        hide(PROGRESS_CARD);
        return;
      }

      if (data.status === 'completed') {
        PROGRESS_ST.textContent = '合并完成，准备下载...';
        PROGRESS_FILL.style.width = '100%';
        PROGRESS_PCT.textContent = '100%';
        triggerDownload();
        return;
      }

      if (data.status === 'merging') {
        PROGRESS_ST.textContent = '正在合并音视频...';
      } else {
        PROGRESS_ST.textContent = '正在下载...';
      }

      pollTimer = setTimeout(pollProgress, 1000);
    })
    .catch(e => {
      setError('查询进度失败: ' + e.message);
      DOWNLOAD_BTN.disabled = false;
      hide(PROGRESS_CARD);
    });
}

function triggerDownload() {
  const a = document.createElement('a');
  a.href = `/api/download/${taskId}/file`;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  hide(PROGRESS_CARD);
  FILE_INFO.textContent = '文件已下载到本地';
  show(SUCCESS_CARD);
  DOWNLOAD_BTN.disabled = false;
}

// ── Batch Download ──
const BATCH_LIST     = $('batchUrlList');
const ADD_URL_BTN    = $('addUrlBtn');
const SAVE_DIR       = $('saveDir');
const RESET_DIR_BTN  = $('resetDirBtn');
const BATCH_RES      = $('batchRes');
const BATCH_START_BTN = $('batchStartBtn');
const BP_OVERALL     = $('bpOverall');
const BP_CURRENT     = $('bpCurrent');
const BP_FILL        = $('bpFill');
const BP_PCT         = $('bpPct');
const BP_SPEED       = $('bpSpeed');
const BATCH_PROGRESS = $('batchProgress');
const BATCH_SUMMARY  = $('batchSummary');
const B_SUMMARY_TEXT = $('bSummaryText');
const B_DETAIL_LIST  = $('bDetailList');

let batchUrls = ['', '']; // start with 2 empty inputs
let batchRunning = false;
let batchResults = [];

// Restore save dir from localStorage
const savedDir = localStorage.getItem('batch_save_dir') || '';
SAVE_DIR.value = savedDir;

SAVE_DIR.addEventListener('input', () => {
  localStorage.setItem('batch_save_dir', SAVE_DIR.value);
});
RESET_DIR_BTN.addEventListener('click', () => {
  SAVE_DIR.value = '';
  localStorage.removeItem('batch_save_dir');
});

function renderUrlInputs() {
  BATCH_LIST.innerHTML = '';
  batchUrls.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'batch-url-row';
    const inp = document.createElement('input');
    inp.type = 'url';
    inp.placeholder = `视频链接 ${i + 1}`;
    inp.value = val;
    inp.addEventListener('input', () => { batchUrls[i] = inp.value; });
    row.appendChild(inp);
    const del = document.createElement('button');
    del.className = 'btn-del';
    del.textContent = '×';
    del.style.display = batchUrls.length > 1 ? '' : 'none';
    del.addEventListener('click', () => { batchUrls.splice(i, 1); renderUrlInputs(); });
    row.appendChild(del);
    BATCH_LIST.appendChild(row);
  });
  updateBatchBtnLabel();
}

function updateBatchBtnLabel() {
  const count = batchUrls.filter(u => u.trim()).length;
  BATCH_START_BTN.textContent = count > 0 ? `批量下载 (${count} 个视频)` : '批量下载';
}

ADD_URL_BTN.addEventListener('click', () => {
  batchUrls.push('');
  renderUrlInputs();
  // Scroll to new input
  const inputs = BATCH_LIST.querySelectorAll('input');
  if (inputs.length > 0) inputs[inputs.length - 1].focus();
});

// Batch download
BATCH_START_BTN.addEventListener('click', async () => {
  const urls = batchUrls.map(u => u.trim()).filter(u => u);
  if (urls.length === 0) { setError('请输入至少一个视频链接'); return; }

  const saveDir = SAVE_DIR.value.trim();
  const res = BATCH_RES.value;

  batchRunning = true;
  batchResults = [];
  BATCH_START_BTN.disabled = true;
  hide(ERROR);
  hide(BATCH_SUMMARY);
  show(BATCH_PROGRESS);
  BP_OVERALL.textContent = `总体进度: 0 / ${urls.length}`;
  BP_CURRENT.textContent = '准备中...';
  BP_FILL.style.width = '0%';
  BP_PCT.textContent = '0%';
  BP_SPEED.textContent = '';

  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    BP_OVERALL.textContent = `总体进度: ${i} / ${urls.length}`;
    BP_CURRENT.textContent = `正在获取 [${i + 1}/${urls.length}]...`;
    BP_PCT.textContent = `${Math.round(i / urls.length * 100)}%`;
    BP_FILL.style.width = `${Math.round(i / urls.length * 100)}%`;

    try {
      const resp = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, resolution: res, save_dir: saveDir }),
      });
      const json = await resp.json();
      if (!resp.ok) throw new Error(json.detail || '启动失败');
      const taskId = json.task_id;

      await pollBatchTask(taskId, i, urls.length, url);
      batchResults.push({ url, success: true, error: '' });
    } catch (e) {
      batchResults.push({ url, success: false, error: e.message });
    }
  }

  // Done
  batchRunning = false;
  BATCH_START_BTN.disabled = false;
  hide(BATCH_PROGRESS);
  showSummary(urls);
});

function pollBatchTask(taskId, index, total, url) {
  return new Promise((resolve) => {
    const poll = () => {
      fetch(`/api/download/${taskId}/status`)
        .then(r => r.json())
        .then(data => {
          const pct = data.progress || 0;
          BP_CURRENT.textContent = `正在下载 [${index + 1}/${total}]: ${url.length > 50 ? url.slice(0, 50) + '...' : url}`;
          BP_FILL.style.width = `${Math.round((index + pct / 100) / total * 100)}%`;
          BP_PCT.textContent = `${Math.round((index + pct / 100) / total * 100)}%`;
          BP_SPEED.textContent = data.speed || '';
          BP_OVERALL.textContent = `总体进度: ${index} / ${total}`;

          if (data.status === 'error') { resolve(); return; }
          if (data.status === 'completed') {
            BP_OVERALL.textContent = `总体进度: ${index + 1} / ${total}`;
            BP_FILL.style.width = `${Math.round((index + 1) / total * 100)}%`;
            BP_PCT.textContent = `${Math.round((index + 1) / total * 100)}%`;
            BP_CURRENT.textContent = `完成 [${index + 1}/${total}]`;
            resolve();
            return;
          }
          setTimeout(poll, 1000);
        })
        .catch(() => { resolve(); });
    };
    poll();
  });
}

function showSummary(urls) {
  const ok = batchResults.filter(r => r.success).length;
  const fail = batchResults.filter(r => !r.success).length;
  B_SUMMARY_TEXT.innerHTML = `
    <p class="${ok > 0 ? 's-ok' : ''}">✅ 成功: ${ok} 个</p>
    ${fail > 0 ? `<p class="s-fail">❌ 失败: ${fail} 个</p>` : ''}
  `;
  B_DETAIL_LIST.innerHTML = batchResults.map((r, i) =>
    `<div class="${r.success ? 'd-ok' : 'd-fail'}">${i + 1}. ${r.success ? '✅' : '❌'} ${r.url.slice(0, 60)}${r.error ? ' — ' + r.error : ''}</div>`
  ).join('');
  show(BATCH_SUMMARY);
}

renderUrlInputs();

// Enter key to trigger fetch
URL_INPUT.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !FETCH_BTN.disabled) FETCH_BTN.click();
});
</script>
