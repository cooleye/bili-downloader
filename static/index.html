<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频下载工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    display: flex; justify-content: center; padding: 40px 16px;
  }
  .container { max-width: 680px; width: 100%; }

  /* Header */
  h1 {
    font-size: 24px; font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  h1 svg { width: 28px; height: 28px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }

  /* Card */
  .card {
    background: #fff; border-radius: 12px; padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px;
  }

  /* URL Input */
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; padding: 12px 16px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: #fb7299; }
  .btn {
    padding: 12px 24px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s; white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-primary { background: #fb7299; color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .85; }
  .btn-success { background: #00c853; color: #fff; }
  .btn-success:hover:not(:disabled) { opacity: .85; }
  .btn-download { background: #7c4dff; color: #fff; width: 100%; margin-top: 12px; }
  .btn-download:hover:not(:disabled) { opacity: .85; }

  /* Loading */
  .loading { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: #666; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2.5px solid #e0e0e0; border-top-color: #fb7299; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box { background: #fff0f0; border: 1px solid #ffcdd2; border-radius: 8px; padding: 12px 16px; color: #c62828; font-size: 14px; margin: 12px 0; }

  /* Video Info */
  .video-header { display: flex; gap: 16px; margin-bottom: 16px; }
  .video-header img {
    width: 160px; height: 100px; object-fit: cover; border-radius: 8px;
    flex-shrink: 0; background: #f5f5f5;
  }
  .video-meta { min-width: 0; }
  .video-meta h2 { font-size: 17px; line-height: 1.4; margin-bottom: 6px; }
  .video-meta .desc {
    font-size: 13px; color: #666; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .video-meta .duration {
    font-size: 13px; color: #999; margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Resolution */
  .res-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .res-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .res-option {
    position: relative;
  }
  .res-option input { position: absolute; opacity: 0; width: 0; height: 0; }
  .res-option label {
    display: inline-block; padding: 8px 20px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; cursor: pointer;
    transition: all .2s; user-select: none;
  }
  .res-option input:checked + label {
    border-color: #fb7299; background: #fff0f5; color: #fb7299; font-weight: 600;
  }
  .res-option label:hover { border-color: #fb7299; }

  /* Progress */
  .progress-section { margin-top: 12px; }
  .progress-status { font-size: 13px; color: #666; margin-bottom: 6px; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #fb7299, #ff9eb5);
    border-radius: 4px; transition: width .3s ease; width: 0%;
  }
  .progress-text { font-size: 13px; color: #999; margin-top: 6px; display: flex; justify-content: space-between; }
  .progress-text .speed { color: #666; }

  /* Success */
  .success-box {
    background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px;
    padding: 16px; text-align: center; margin-top: 8px;
  }
  .success-box p { font-size: 15px; color: #2e7d32; font-weight: 600; margin-bottom: 8px; }
  .success-box .file-info { font-size: 13px; color: #555; font-weight: 400; word-break: break-all; }

  /* Cookies */
  .cookies-summary {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .cookies-summary .indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-ok { background: #00c853; }
  .dot-miss { background: #ff9800; }
  .cookies-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  .cookies-body .hint {
    font-size: 12px; color: #999; line-height: 1.6; margin-bottom: 10px;
  }
  .cookies-body .hint code {
    background: #f5f5f5; padding: 1px 5px; border-radius: 3px; font-size: 12px;
  }
  .cookies-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .cookies-row input[type=file] { display: none; }
  .cookies-row .file-label {
    padding: 8px 16px; background: #f5f5f5; border: 1.5px dashed #ccc;
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .cookies-row .file-label:hover { border-color: #fb7299; background: #fff0f5; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-outline { background: transparent; border: 1.5px solid #e0e0e0; }
  .btn-outline:hover:not(:disabled) { border-color: #e53935; color: #e53935; }
  .cookies-status { font-size: 13px; color: #666; margin-top: 6px; }

  /* Utility */
  .hidden { display: none !important; }
  hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }

  @media (max-width: 540px) {
    .input-row { flex-direction: column; }
    .btn { text-align: center; }
    .video-header { flex-direction: column; }
    .video-header img { width: 100%; height: auto; aspect-ratio: 16/10; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="#fb7299" stroke-width="2">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polygon points="10,8 16,12 10,16" fill="#fb7299" stroke="none"/>
    </svg>
    视频下载
  </h1>
  <p class="subtitle">支持 Bilibili / YouTube / 抖音，粘贴链接一键下载 MP4</p>

  <!-- Input -->
  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="Bilibili / YouTube / 抖音 视频链接..." autofocus>
      <button class="btn btn-primary" id="fetchBtn">获取信息</button>
    </div>
  </div>

  <!-- Cookies -->
  <div class="card" id="cookiesCard">
    <div class="cookies-summary" id="cookiesToggle">
      <span style="font-size:14px;font-weight:600">🍪 Cookies</span>
      <span class="indicator" id="cookiesIndicator">
        <span class="dot dot-miss" id="cookiesDot"></span>
        <span id="cookiesLabel">抖音需要 cookies，点击设置</span>
      </span>
    </div>
    <div class="cookies-body hidden" id="cookiesBody">
      <div class="hint">
        抖音需要浏览器 cookies 才能下载。<br>
        导出方法：浏览器安装 <code>Get cookies.txt</code> 扩展 → 访问 douyin.com → 导出 cookies → 上传
      </div>
      <div class="cookies-row">
        <label class="file-label" id="cookiesFileLabel">
          📄 选择 cookies.txt
          <input type="file" id="cookiesFileInput" accept=".txt">
        </label>
        <button class="btn btn-sm btn-outline hidden" id="cookiesClearBtn">清除</button>
        <span class="cookies-status" id="cookiesStatus"></span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="card loading hidden" id="loading">
    <div class="spinner"></div>
    <span>正在获取视频信息...</span>
  </div>

  <!-- Error -->
  <div class="error-box hidden" id="error"></div>

  <!-- Video Info -->
  <div class="card hidden" id="infoCard">
    <div class="video-header">
      <img id="thumbnail" src="" alt="缩略图" referrerpolicy="no-referrer">
      <div class="video-meta">
        <h2 id="videoTitle"></h2>
        <p class="desc" id="videoDesc"></p>
        <p class="duration" id="videoDuration"></p>
      </div>
    </div>

    <hr>

    <div class="res-title">选择分辨率</div>
    <div class="res-options" id="resolutionOptions"></div>

    <button class="btn btn-download" id="downloadBtn">下载视频</button>
  </div>

  <!-- Progress -->
  <div class="card hidden" id="progressCard">
    <div class="progress-section">
      <div class="progress-status" id="progressStatus">正在下载...</div>
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="progressPercent">0%</span>
        <span class="speed" id="progressSpeed"></span>
      </div>
    </div>
  </div>

  <!-- Success -->
  <div class="card hidden" id="successCard">
    <div class="success-box">
      <p>下载完成!</p>
      <p class="file-info" id="fileInfo"></p>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const URL_INPUT     = $('urlInput');
const FETCH_BTN     = $('fetchBtn');
const LOADING       = $('loading');
const ERROR         = $('error');
const INFO_CARD     = $('infoCard');
const THUMBNAIL     = $('thumbnail');
const VIDEO_TITLE   = $('videoTitle');
const VIDEO_DESC    = $('videoDesc');
const VIDEO_DUR     = $('videoDuration');
const RES_OPTIONS   = $('resolutionOptions');
const DOWNLOAD_BTN  = $('downloadBtn');
const PROGRESS_CARD = $('progressCard');
const PROGRESS_FILL = $('progressFill');
const PROGRESS_PCT  = $('progressPercent');
const PROGRESS_SPD  = $('progressSpeed');
const PROGRESS_ST   = $('progressStatus');
const SUCCESS_CARD  = $('successCard');
const FILE_INFO     = $('fileInfo');

let currentUrl = '';
let taskId = '';
let pollTimer = null;

function formatDuration(sec) {
  if (!sec) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }
function setError(msg) {
  ERROR.textContent = msg;
  show(ERROR);
  hide(LOADING);
}

// Fetch info
FETCH_BTN.addEventListener('click', async () => {
  const url = URL_INPUT.value.trim();
  if (!url) { setError('请输入视频链接'); return; }

  hide(ERROR);
  hide(INFO_CARD);
  hide(PROGRESS_CARD);
  hide(SUCCESS_CARD);
  show(LOADING);
  FETCH_BTN.disabled = true;
  DOWNLOAD_BTN.disabled = true;
  currentUrl = url;

  try {
    const resp = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
    const json = await resp.json();
    if (!resp.ok || !json.success) {
      throw new Error(json.detail || '获取信息失败');
    }
    renderInfo(json.data);
  } catch (e) {
    setError(e.message);
  } finally {
    hide(LOADING);
    FETCH_BTN.disabled = false;
  }
});

function renderInfo(data) {
  THUMBNAIL.src = data.thumbnail || '';
  THUMBNAIL.onerror = () => { THUMBNAIL.src = ''; THUMBNAIL.style.display = 'none'; };
  VIDEO_TITLE.textContent = data.title;
  VIDEO_DESC.textContent = data.description || '暂无简介';
  VIDEO_DUR.textContent = `时长 ${formatDuration(data.duration)}`;

  RES_OPTIONS.innerHTML = '';
  const fmts = data.formats || [];
  fmts.forEach((fmt, i) => {
    const div = document.createElement('div');
    div.className = 'res-option';
    div.innerHTML = `
      <input type="radio" name="res" id="res_${fmt}" value="${fmt}" ${i === 0 ? 'checked' : ''}>
      <label for="res_${fmt}">${fmt}</label>
    `;
    RES_OPTIONS.appendChild(div);
  });

  DOWNLOAD_BTN.disabled = false;
  show(INFO_CARD);
}

// Download
DOWNLOAD_BTN.addEventListener('click', async () => {
  const selected = document.querySelector('input[name="res"]:checked');
  if (!selected) { setError('请选择分辨率'); return; }

  DOWNLOAD_BTN.disabled = true;
  hide(ERROR);
  hide(SUCCESS_CARD);
  show(PROGRESS_CARD);
  PROGRESS_FILL.style.width = '0%';
  PROGRESS_PCT.textContent = '0%';
  PROGRESS_SPD.textContent = '';
  PROGRESS_ST.textContent = '正在下载...';

  try {
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: currentUrl, resolution: selected.value }),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.detail || '启动下载失败');

    taskId = json.task_id;
    pollProgress();
  } catch (e) {
    setError(e.message);
    DOWNLOAD_BTN.disabled = false;
    hide(PROGRESS_CARD);
  }
});

function pollProgress() {
  if (pollTimer) clearTimeout(pollTimer);

  fetch(`/api/download/${taskId}/status`)
    .then(r => r.json())
    .then(data => {
      const pct = data.progress || 0;
      PROGRESS_FILL.style.width = pct + '%';
      PROGRESS_PCT.textContent = pct + '%';
      PROGRESS_SPD.textContent = data.speed || '';

      if (data.status === 'error') {
        setError(data.error || '下载失败');
        DOWNLOAD_BTN.disabled = false;
        hide(PROGRESS_CARD);
        return;
      }

      if (data.status === 'completed') {
        PROGRESS_ST.textContent = '合并完成，准备下载...';
        PROGRESS_FILL.style.width = '100%';
        PROGRESS_PCT.textContent = '100%';
        triggerDownload();
        return;
      }

      if (data.status === 'merging') {
        PROGRESS_ST.textContent = '正在合并音视频...';
      } else {
        PROGRESS_ST.textContent = '正在下载...';
      }

      pollTimer = setTimeout(pollProgress, 1000);
    })
    .catch(e => {
      setError('查询进度失败: ' + e.message);
      DOWNLOAD_BTN.disabled = false;
      hide(PROGRESS_CARD);
    });
}

function triggerDownload() {
  const a = document.createElement('a');
  a.href = `/api/download/${taskId}/file`;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  hide(PROGRESS_CARD);
  FILE_INFO.textContent = '文件已下载到本地';
  show(SUCCESS_CARD);
  DOWNLOAD_BTN.disabled = false;
}

// ── Cookies ──
const COOKIES_TOGGLE   = $('cookiesToggle');
const COOKIES_BODY     = $('cookiesBody');
const COOKIES_DOT      = $('cookiesDot');
const COOKIES_LABEL    = $('cookiesLabel');
const COOKIES_FILE_INP = $('cookiesFileInput');
const COOKIES_CLEAR_BTN = $('cookiesClearBtn');
const COOKIES_STATUS   = $('cookiesStatus');

// Toggle cookies section
COOKIES_TOGGLE.addEventListener('click', () => {
  COOKIES_BODY.classList.toggle('hidden');
});

// Check cookies status on load
async function checkCookies() {
  try {
    const r = await fetch('/api/cookies');
    const d = await r.json();
    if (d.loaded) {
      COOKIES_DOT.className = 'dot dot-ok';
      COOKIES_LABEL.textContent = `cookies 已加载 (${(d.size / 1024).toFixed(1)}KB)`;
      show(COOKIES_CLEAR_BTN);
    } else {
      COOKIES_DOT.className = 'dot dot-miss';
      COOKIES_LABEL.textContent = '抖音需要 cookies，点击设置';
      hide(COOKIES_CLEAR_BTN);
    }
  } catch (_) {
    COOKIES_DOT.className = 'dot dot-miss';
    COOKIES_LABEL.textContent = 'cookies 状态未知';
  }
}

// Upload cookies
COOKIES_FILE_INP.addEventListener('change', async () => {
  const file = COOKIES_FILE_INP.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  COOKIES_STATUS.textContent = '上传中...';
  try {
    const r = await fetch('/api/cookies', { method: 'POST', body: form });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    COOKIES_STATUS.textContent = '✅ cookies 上传成功！';
    checkCookies();
  } catch (e) {
    COOKIES_STATUS.textContent = '❌ ' + e.message;
  }
});

// Clear cookies
COOKIES_CLEAR_BTN.addEventListener('click', async () => {
  try {
    await fetch('/api/cookies', { method: 'DELETE' });
    COOKIES_STATUS.textContent = '已清除 cookies';
    checkCookies();
  } catch (_) {
    COOKIES_STATUS.textContent = '清除失败';
  }
});

checkCookies();

// Enter key to trigger fetch
URL_INPUT.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !FETCH_BTN.disabled) FETCH_BTN.click();
});
</script>
</body>
</html>
